<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>何时倚虚幌?</title>
  <meta name="description" content="YangtzeChen 的个人博客 — 记录思考、创作与生活。">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- Navigation -->
  <nav class="site-nav" id="site-nav">
    <div class="container nav-inner">
      <a href="/" class="nav-logo">YangtzeChen</a>
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="nav-links">
        <li><a href="/" class="active">首页</a></li>
        <li><a href="/blog/">文章</a></li>
        <li><a href="/gallery/">相册</a></li>
      </ul>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero fade-in">
    <div class="container">
      <p class="hero-greeting">Welcome to here!</p>
      <h1>我是 YangtzeChen</h1>
      <p class="hero-sub">
        在这里,记录影像。
      </p>
      <div class="hero-divider"></div>
    </div>
  </section>

  <!-- About -->
  <section class="section fade-in">
    <div class="container">
      <h2 class="section-title">关于我</h2>
      <p class="section-subtitle">
        一个热爱探索和记录生活的人。喜欢摄影、技术和不期而遇的风景。
      </p>
    </div>
  </section>

  <!-- Latest Photography -->
  <section class="section fade-in" id="latest-photography-section">
    <div class="container-wide">
      <h2 class="section-title">最新摄影</h2>
      <p class="section-subtitle">近期捕捉的瞬间</p>
      <div class="photography-mosaic" id="latest-photography">
        <div class="spinner"></div>
      </div>
      <div class="text-center" style="margin-top: 2.5rem;">
        <a href="/gallery/" class="btn">浏览完整图库</a>
      </div>
    </div>
  </section>

  <!-- Latest Posts -->
  <section class="section fade-in" id="latest-posts-section">
    <div class="container">
      <h2 class="section-title">最新文章</h2>
      <p class="section-subtitle">最近写下的一些文字</p>
      <div class="post-grid" id="latest-posts">
        <div class="spinner"></div>
      </div>
      <div class="text-center" style="margin-top: 2.5rem;">
        <a href="/blog/" class="btn">查看全部文章</a>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container">
      <div class="footer-social">
        <a href="https://github.com/YangtzeChen" target="_blank" rel="noopener" aria-label="GitHub">GitHub</a>
      </div>
      <p>&copy; 2026 YangtzeChen. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
