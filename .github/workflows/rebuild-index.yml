name: Rebuild Content Index

on:
  push:
    paths:
      - 'content/blog/**'
      - 'content/gallery/**'

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rebuild blog index.json
        run: |
          cd content/blog
          python3 -c "
          import os, json, re
          files = [f for f in os.listdir('.') if f.endswith('.md')]
          out = []
          for f in files:
              with open(f, 'r', encoding='utf-8') as file:
                  content = file.read()
              match = re.search(r'^---\s*\n(.*?)\n---\s*\n', content, re.DOTALL)
              if match:
                  meta = {}
                  for line in match.group(1).split('\n'):
                      if ':' in line:
                          k, v = line.split(':', 1)
                          k = k.strip()
                          v = v.strip().strip('\"').strip('\'')
                          meta[k] = v
                  meta['slug'] = f[:-3]
                  out.append(meta)
          with open('index.json', 'w', encoding='utf-8') as w:
              json.dump(out, w, indent=2, ensure_ascii=False)
          "

      - name: Rebuild gallery index.json
        run: |
          cd content/gallery
          mkdir -p items
          python3 -c "
          import os, json
          files = [f for f in os.listdir('items') if f.endswith('.json')] if os.path.exists('items') else []
          out = []
          for f in files:
              try:
                  with open(os.path.join('items', f), 'r', encoding='utf-8') as file:
                      data = json.load(file)
                  if data: out.append(data)
              except Exception: pass
          with open('index.json', 'w', encoding='utf-8') as w:
              json.dump(out, w, indent=2, ensure_ascii=False)
          "

      - name: Commit updated indexes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add content/blog/index.json content/gallery/index.json
          git diff --cached --quiet || git commit -m "chore: rebuild content indexes"
          git push
