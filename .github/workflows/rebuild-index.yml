name: Rebuild Content Index

on:
  push:
    paths:
      - 'content/blog/**'
      - 'content/gallery/**'

permissions:
  contents: write

concurrency:
  group: rebuild-index
  cancel-in-progress: true

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install Pillow

      - name: Rebuild all content indexes and thumbnails
        run: python3 build_index.py

      - name: Commit updated changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # 1. 暂存改动 (包含索引、版本号和生成的缩略图)
          git add content/blog/index.json content/gallery/index.json content/gallery/thumbnails/*.webp content/version.json
          
          # 2. 检查是否有实际差异
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          # 3. 尝试提交
          git commit -m "chore: rebuild content indexes and thumbnails [skip ci]"
          
          # 4. 稳健的推送逻辑 (带重试与冲突解决)
          MAX_RETRIES=3
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i to push changes..."
            if git pull origin main --rebase --autostash; then
              if git push; then
                echo "Push successful"
                exit 0
              fi
            else
              echo "Conflict detected, forcing clean re-base and re-generating content..."
              git rebase --abort || true
              git fetch origin main
              git reset --hard origin/main
              # 重新运行统一生成脚本
              python3 build_index.py
              git add content/blog/index.json content/gallery/index.json content/gallery/thumbnails/*.webp content/version.json
              git commit -m "chore: rebuild content indexes and thumbnails [skip ci] (recovery)" || true
            fi
            sleep 2
          done
          
          # 最后一次硬推（如果重试还是失败）
          git push --force || echo "Final push attempt failed"

