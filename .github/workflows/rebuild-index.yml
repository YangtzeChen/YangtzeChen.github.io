name: Rebuild Content Index

on:
  push:
    paths:
      - 'content/blog/**'
      - 'content/gallery/**'

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rebuild blog index.json
        run: |
          mkdir -p content/blog
          cd content/blog
          cat << 'EOF' > builder.py
          import os, json, re
          try:
              files = [f for f in os.listdir('.') if f.endswith('.md')]
              out = []
              for f in files:
                  try:
                      with open(f, 'r', encoding='utf-8') as file:
                          content = file.read()
                      match = re.search(r'^---\s*\n(.*?)\n---\s*\n', content, re.DOTALL)
                      if match:
                          meta = {}
                          for line in match.group(1).split('\n'):
                              if ':' in line:
                                  k, v = line.split(':', 1)
                                  k = k.strip()
                                  v = v.strip().strip('"').strip("'")
                                  meta[k] = v
                          meta['slug'] = f[:-3]
                          out.append(meta)
                  except Exception as e:
                      print(f'Skipping file {f} due to error: {e}')
              out.sort(key=lambda x: x.get('updated') if x.get('updated') else x.get('date', ''), reverse=True)
              with open('index.json', 'w', encoding='utf-8') as w:
                  json.dump(out, w, indent=2, ensure_ascii=False)
          except Exception as e:
              print(f'Fatal error rebuilding blog index: {e}')
              with open('index.json', 'w', encoding='utf-8') as w:
                  w.write('[]')
          EOF
          python3 builder.py

      - name: Rebuild gallery index.json
        run: |
          cd content/gallery
          cat << 'EOF' > builder.py
          import os, json
          try:
              out = []
              # Check multiple possible locations for metadata JSONs
              search_dirs = ['items', '.', 'content/gallery/items']
              processed_files = set()
              
              print(f"Scanning for gallery items in: {search_dirs}")
              
              for s_dir in search_dirs:
                  if not os.path.exists(s_dir):
                      continue
                  for root, dirs, files in os.walk(s_dir):
                      for f in files:
                          if f.endswith('.json') and f != 'index.json' and f not in processed_files:
                              f_path = os.path.join(root, f)
                              try:
                                  with open(f_path, 'r', encoding='utf-8') as file:
                                      data = json.load(file)
                                  if data:
                                      print(f"Found metadata: {f_path}")
                                      if isinstance(data, list):
                                          out.extend(data)
                                      else:
                                          out.append(data)
                                      processed_files.add(f)
                              except Exception as e:
                                  print(f"Error reading {f_path}: {e}")

              # Sort outcomes
              out.sort(key=lambda x: str(x.get('date', '')), reverse=True)
              print(f"Total entries found: {len(out)}")
              
              with open('index.json', 'w', encoding='utf-8') as w:
                  json.dump(out, w, indent=2, ensure_ascii=False)
              print("Successfully wrote index.json")
          except Exception as e:
              print(f"Builder failed: {e}")
              exit(1)
          EOF
          python3 builder.py

      - name: Generate build version
        run: |
          python3 -c "import json, time; f=open('content/version.json', 'w'); json.dump({'version': int(time.time() * 1000)}, f); f.close()"

      - name: Commit updated indexes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # 1. 暂存本地改动
          git add content/blog/index.json content/gallery/index.json content/version.json
          
          # 2. 检查是否有实际差异
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          # 3. 尝试提交
          git commit -m "chore: rebuild content indexes [skip ci]"
          
          # 4. 稳健的推送逻辑 (带重试与冲突解决)
          MAX_RETRIES=3
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i to push changes..."
            if git pull origin main --rebase --autostash; then
              if git push; then
                echo "Push successful"
                exit 0
              fi
            else
              echo "Conflict detected, forcing clean re-base and re-generating indexes..."
              git rebase --abort || true
              git fetch origin main
              git reset --hard origin/main
              # 重新运行生成脚本 (此处可精简，关键是同步后的状态)
              python3 content/blog/builder.py
              python3 content/gallery/builder.py
              git add content/blog/index.json content/gallery/index.json content/version.json
              git commit -m "chore: rebuild content indexes [skip ci] (recovery)" || true
            fi
            sleep 2
          done
          
          # 最后一次硬推（如果重后还是失败）
          git push --force || echo "Final push attempt failed"
