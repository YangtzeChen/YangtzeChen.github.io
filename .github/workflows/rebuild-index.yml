name: Rebuild Content Index

on:
  push:
    paths:
      - 'content/blog/**'
      - 'content/gallery/**'

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rebuild blog index.json
        run: |
          mkdir -p content/blog
          cd content/blog
          cat << 'EOF' > builder.py
          import os, json, re
          try:
              files = [f for f in os.listdir('.') if f.endswith('.md')]
              out = []
              for f in files:
                  try:
                      with open(f, 'r', encoding='utf-8') as file:
                          content = file.read()
                      match = re.search(r'^---\s*\n(.*?)\n---\s*\n', content, re.DOTALL)
                      if match:
                          meta = {}
                          for line in match.group(1).split('\n'):
                              if ':' in line:
                                  k, v = line.split(':', 1)
                                  k = k.strip()
                                  v = v.strip().strip('"').strip("'")
                                  meta[k] = v
                          meta['slug'] = f[:-3]
                          out.append(meta)
                  except Exception as e:
                      print(f'Skipping file {f} due to error: {e}')
              out.sort(key=lambda x: x.get('updated') if x.get('updated') else x.get('date', ''), reverse=True)
              with open('index.json', 'w', encoding='utf-8') as w:
                  json.dump(out, w, indent=2, ensure_ascii=False)
          except Exception as e:
              print(f'Fatal error rebuilding blog index: {e}')
              with open('index.json', 'w', encoding='utf-8') as w:
                  w.write('[]')
          EOF
          python3 builder.py

      - name: Rebuild gallery index.json
        run: |
          cd content/gallery
          import os, json, time
          try:
              # --- Diagnostic Info ---
              print(f"--- Environment Check ---")
              print(f"Working directory: {os.getcwd()}")
              for root, dirs, files in os.walk('.'):
                  path = root.split(os.sep)
                  print((len(path) - 1) * '  ', os.path.basename(root))
                  for file in files:
                      print(len(path) * '  ', file)
              
              out = []
              items_dir = 'items'
              images_dir = 'images'
              processed_hashes = set()

              # 1. First, process metadata files in items/ (if any)
              if os.path.exists(items_dir):
                  print(f"Scanning metadata in {items_dir}...")
                  for root, dirs, files in os.walk(items_dir):
                      for f in files:
                          if f.endswith('.json'):
                              try:
                                  with open(os.path.join(root, f), 'r', encoding='utf-8') as file:
                                      data = json.load(file)
                                  if data and 'images' in data:
                                      out.append(data)
                                      for img in data['images']:
                                          # Extract hash or name to avoid duplication
                                          processed_hashes.add(os.path.basename(img['image']))
                              except Exception as e:
                                  print(f"  Error loading {f}: {e}")

              # 2. Second, scan images/ for orphan images
              if os.path.exists(images_dir):
                  print(f"Scanning orphan images in {images_dir}...")
                  for root, dirs, files in os.walk(images_dir):
                      for f in files:
                          if f.lower().endswith(('.jpg', '.jpeg', '.png', '.gif', '.webp', '.jfif')):
                              if f not in processed_hashes and f != '.gitkeep':
                                  print(f"  Found orphan image: {f}")
                                  # Create a default entry
                                  entry = {
                                      "title": f.split('.')[0].replace('gal-', 'Photo: '),
                                      "date": time.strftime('%Y-%m-%d %H:%M:%S', time.localtime()),
                                      "images": [{
                                          "image": f"/content/gallery/images/{f}",
                                          "sub_title": "Auto-indexed",
                                          "description": "Captured by automatic builder."
                                      }]
                                  }
                                  out.append(entry)

              # 3. Finalize
              out.sort(key=lambda x: str(x.get('date', '')), reverse=True)
              print(f"Total entries: {len(out)}")
              
              with open('index.json', 'w', encoding='utf-8') as w:
                  json.dump(out, w, indent=2, ensure_ascii=False)
              print("Successfully wrote index.json")
          except Exception as e:
              print(f"Fatal builder error: {e}")
              exit(1)
          EOF
          python3 builder.py

      - name: Generate build version
        run: |
          python3 -c "import json, time; f=open('content/version.json', 'w'); json.dump({'version': int(time.time() * 1000)}, f); f.close()"

      - name: Commit updated indexes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # 1. 暂存本地改动
          git add content/blog/index.json content/gallery/index.json content/version.json
          
          # 2. 检查是否有实际差异
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          # 3. 尝试提交
          git commit -m "chore: rebuild content indexes [skip ci]"
          
          # 4. 稳健的推送逻辑 (带重试与冲突解决)
          MAX_RETRIES=3
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i to push changes..."
            if git pull origin main --rebase --autostash; then
              if git push; then
                echo "Push successful"
                exit 0
              fi
            else
              echo "Conflict detected, forcing clean re-base and re-generating indexes..."
              git rebase --abort || true
              git fetch origin main
              git reset --hard origin/main
              # 重新运行生成脚本 (此处可精简，关键是同步后的状态)
              python3 content/blog/builder.py
              python3 content/gallery/builder.py
              git add content/blog/index.json content/gallery/index.json content/version.json
              git commit -m "chore: rebuild content indexes [skip ci] (recovery)" || true
            fi
            sleep 2
          done
          
          # 最后一次硬推（如果重后还是失败）
          git push --force || echo "Final push attempt failed"
