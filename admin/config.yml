backend:
  name: github
  repo: YangtzeChen/YangtzeChen.github.io
  branch: main
  base_url: https://sveltia-cms-auth.yangtzechenw.workers.dev
  publish_mode: simple
  always_uptodate: true
  # ↑ 部署 OAuth 代理后，替换为你的 Cloudflare Workers URL

media_folder: "content/gallery/images"
public_folder: "/content/gallery/images"

locale: "zh_Hans"

collections:
  - name: "blog"
    label: "博客文章"
    folder: "content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "md"
    format: "frontmatter"
    view_style: "grid"
    summary: "{{title}} | {{date}} | {{updated}}"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "日期", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: "HH:mm:ss", picker_utc: false, required: false }
      - { label: "更新时间", name: "updated", widget: "datetime", date_format: "YYYY-MM-DD", time_format: "HH:mm:ss", picker_utc: false, required: false }
      - { label: "摘要", name: "excerpt", widget: "text", required: false }
      - { label: "封面图", name: "image", widget: "image", required: false }
      - { label: "正文", name: "body", widget: "markdown" }

  - name: "gallery"
    label: "相册"
    folder: "content/gallery/items"
    create: true
    slug: "{{year}}{{month}}{{day}}{{hour}}{{minute}}{{second}}-{{slug}}"
    extension: "json"
    format: "json"
    view_style: "grid"
    summary: "{{title}} \n作成: {{date}} \n更新: {{updated}}"
    fields:
      - { label: "日期", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: "HH:mm:ss", picker_utc: false, required: false }
      - { label: "更新时间", name: "updated", widget: "datetime", date_format: "YYYY-MM-DD", time_format: "HH:mm:ss", picker_utc: false, required: false }
      - { label: "图组主标题", name: "title", widget: "string", default: "新的相册" }
      - { label: "重磅封面图", name: "image", widget: "image", required: true, hint: "这必须是一张主力的展示图片，用于填补后台列表和各项首页缩略图" }
      - { label: "图组主描述", name: "caption", widget: "string", required: false }
      - label: "详细分图列表"
        name: "images"
        widget: "list"
        summary: "{{fields.sub_title}}"
        fields:
          - { label: "图片", name: "image", widget: "image" }
          - { label: "子标题", name: "sub_title", widget: "string", required: false }
          - { label: "子描述", name: "sub_caption", widget: "string", required: false }
