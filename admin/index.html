<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章管理</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/admin/css/cms.css">
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
</head>
<body>

  <!-- 管理导航 -->
  <nav class="cms-nav">
    <div class="container nav-inner">
      <a href="/" class="cms-logo">YangtzeChen</a>
      <div class="cms-tabs">
        <button class="active" data-tab="articles">文章</button>
        <button data-tab="images" disabled>图片（待开发）</button>
      </div>
      <a href="/" class="cms-back">返回主页</a>
    </div>
  </nav>

  <!-- 主内容 -->
  <main class="cms-main">

    <!-- 文章列表 -->
    <section class="section" id="list-view">
      <div class="container">
        <div class="section-head">
          <h1 class="section-title fade-in">文章管理</h1>
          <button id="btn-new-article" class="btn-primary">+ 新建文章</button>
        </div>
      </div>
      <div class="container-wide">
        <div class="post-grid" id="article-list"></div>
      </div>
    </section>

    <!-- 文章编辑表单 -->
    <section class="post-article" id="form-view" style="display:none;">
      <div class="container">
        <a href="#" class="back-link" id="back-to-list">← 返回列表</a>
        <div class="form-card">
          <div class="form-card-header">
            <h1 id="form-title" class="form-card-title">发布文章</h1>
            <div class="form-card-actions">
              <button type="button" id="btn-save-draft" class="btn-secondary">保存草稿</button>
              <button type="button" id="btn-publish" class="btn-primary">发布</button>
            </div>
          </div>

          <form id="article-form" class="form-fields">
            <!-- 隐藏字段：slug -->
            <input type="hidden" id="post-slug">

            <!-- 日期（自动填充，不可见） -->
            <input type="hidden" id="post-date">
            <input type="hidden" id="post-updated">

            <!-- 标题 -->
            <div class="field-group">
              <label class="field-label" for="post-title">标题 <span id="title-count" class="char-count">0/50</span></label>
              <input type="text" id="post-title" class="field-input" maxlength="50" placeholder="输入文章标题" required>
            </div>

            <!-- 摘要 -->
            <div class="field-group">
              <label class="field-label" for="post-excerpt">摘要 <span id="excerpt-count" class="char-count">0/300</span></label>
              <textarea id="post-excerpt" class="field-input" maxlength="300" rows="3" placeholder="输入文章摘要（可选）"></textarea>
            </div>

            <!-- 封面 -->
            <!-- 封面 -->
            <div class="cover-layout">
              <!-- 第一框：封面色 -->
              <div class="cover-box">
                <label class="field-label">封面色</label>
                <div class="color-picker-wrap" id="color-picker-wrap">
                  <div class="color-presets" id="color-presets">
                    <button type="button" class="color-preset" data-color="#E98181" style="background: linear-gradient(135deg, #E98181, #E5966D)"></button>
                    <button type="button" class="color-preset" data-color="#70ABA7" style="background: linear-gradient(135deg, #70ABA7, #6B918D)"></button>
                    <button type="button" class="color-preset" data-color="#68A1AE" style="background: linear-gradient(135deg, #68A1AE, #5891B7)"></button>
                    <button type="button" class="color-preset" data-color="#8C7D92" style="background: linear-gradient(135deg, #8C7D92, #7F6889)"></button>
                    <button type="button" class="color-preset" data-color="#CE9437" style="background: linear-gradient(135deg, #CE9437, #C18047)"></button>
                    <button type="button" class="color-preset" data-color="#53A777" style="background: linear-gradient(135deg, #53A777, #478E65)"></button>
                    <button type="button" class="color-preset" data-color="#C6675D" style="background: linear-gradient(135deg, #C6675D, #9D564E)"></button>
                    <button type="button" class="color-preset" data-color="#3A9C89" style="background: linear-gradient(135deg, #3A9C89, #318574)"></button>
                  </div>
                  <div class="custom-color-row">
                    <input type="color" id="custom-color" value="#E98181">
                    <input type="text" id="custom-color-text" class="field-input custom-color-text" value="#E98181" placeholder="#RRGGBB" maxlength="7">
                  </div>
                </div>
              </div>

              <!-- 第二框：封面图片 -->
              <div class="cover-box">
                <label class="field-label">封面图片</label>
                <div class="cover-image-picker">
                  <div class="cover-tabs">
                    <button type="button" class="active" data-mode="gallery">相册</button>
                    <button type="button" data-mode="url">URL</button>
                    <button type="button" data-mode="upload">上传</button>
                  </div>
                  <div class="cover-mode-content">
                    <div class="cover-gallery-grid" id="cover-gallery"></div>
                    <div id="cover-url-wrap" style="display:none" class="upload-row">
                      <input type="url" id="cover-url-input" class="field-input" placeholder="输入图片URL，如 https://...">
                      <button type="button" id="btn-apply-url" class="btn-primary btn-sm" style="white-space:nowrap; border-radius:6px; margin-left:8px;">确定</button>
                    </div>
                    <div id="cover-upload-wrap" style="display:none" class="upload-row">
                      <label for="cover-upload-input" class="upload-label btn-ghost btn-sm">选择文件</label>
                      <input type="file" id="cover-upload-input" accept="image/*">
                    </div>
                    <button type="button" id="btn-clear-cover" class="btn-ghost btn-sm" style="display:none">清除</button>
                  </div>
                </div>
              </div>

              <!-- 第三框：预览 -->
              <div class="cover-box">
                <label class="field-label">预览</label>
                <div class="cover-preview" id="cover-preview"></div>
              </div>
            </div>

            <!-- 可见性 -->
            <div class="field-group">
              <label class="field-label">文章是否显示
                <label class="toggle-wrap">
                  <input type="checkbox" id="post-visible" checked>
                  <span class="toggle-slider"></span>
                </label>
              </label>
            </div>

            <!-- 正文 -->
            <div class="field-group">
              <label class="field-label">正文</label>
              <div id="quill-editor"></div>
            </div>
          </form>
        </div>
      </div>
    </section>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-social">
        <a href="https://github.com/YangtzeChen" target="_blank" rel="noopener">GitHub</a>
      </div>
      <p>&copy; 2026 YangtzeChen. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
  <script src="/admin/js/app.js"></script>
</body>
</html>
