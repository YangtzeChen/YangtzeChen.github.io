<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台管理 — YangtzeChen</title>
  <style>
    body { margin: 0; }
    /* Sveltia CMS variables for transparent image previews */
    :root {
      --sui-image-checkerboard: linear-gradient(45deg, #eee 25%, transparent 25%, transparent 75%, #eee 75%, #eee), linear-gradient(45deg, #eee 25%, transparent 25%, transparent 75%, #eee 75%, #eee);
      --sui-image-checkerboard-position: 0 0, 10px 10px;
      --sui-image-checkerboard-size: 20px 20px;
    }
    
    /* Target Sveltia preview image containers */
    .sveltiacms-image-preview,
    [data-widget="image"] img {
      background-color: var(--sui-image-checkerboard-bg, #fff);
      background-image: var(--sui-image-checkerboard);
      background-position: var(--sui-image-checkerboard-position);
      background-size: var(--sui-image-checkerboard-size);
    }
  </style>
</head>
<body>
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
</body>
</html>
