<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章 — YangtzeChen</title>
  <meta name="description" content="YangtzeChen 的博客文章列表。">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="site-nav" id="site-nav">
    <div class="container nav-inner">
      <a href="/" class="nav-logo">YangtzeChen</a>
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="nav-links">
        <li><a href="/">首页</a></li>
        <li><a href="/blog/" class="active">文章</a></li>
        <li><a href="/gallery/">相册</a></li>
      </ul>
      <div class="theme-picker" id="theme-picker">
        <button class="theme-toggle-btn" aria-label="切换主题">🎨</button>
        <div class="theme-dropdown"></div>
      </div>
    </div>
  </nav>

  <!-- Blog List View -->
  <section class="section" id="blog-list-view">
    <div class="container">
      <h1 class="section-title fade-in">文章</h1>
      <p class="section-subtitle fade-in">所有文章</p>
      
      <!-- 搜索框 -->
      <div class="blog-search-container fade-in">
        <div class="blog-search-wrap">
          <input type="text" id="blog-search-input" placeholder="按标题搜索文章...">
          <span class="search-icon">🔍</span>
        </div>
      </div>
      <div class="post-grid" id="all-posts">
        <div class="spinner"></div>
      </div>
    </div>
  </section>

  <!-- Single Post View (hidden by default) -->
  <section class="post-article" id="post-view" style="display:none;">
    <div class="container">
      <a href="#" class="back-link" id="back-to-list">← 返回列表</a>
      <div class="post-article-header" id="post-header"></div>
      <div class="post-content" id="post-body"></div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container">
      <div class="footer-social">
        <a href="https://github.com/YangtzeChen" target="_blank" rel="noopener" aria-label="GitHub">GitHub</a>
      </div>
      <p>&copy; 2026 YangtzeChen. All rights reserved.</p>
    </div>
  </footer>

  <script src="/js/marked.min.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
